<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Poptávka a nabídka</title>
<style>
  body { margin: 0; padding: 16px; font-family: Arial, sans-serif; background: #eee; display: flex; gap: 20px; align-items: flex-start; }
  canvas { background: white; cursor: crosshair; display: block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  #panel { background: white; padding: 16px; min-width: 240px; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  h3 { margin: 0 0 10px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
  .row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
  .lbl { font-weight: bold; font-size: 13px; min-width: 55px; }
  .up  { color: #cc0000; font-size: 24px; font-weight: bold; line-height: 1; }
  .dn  { color: #008800; font-size: 24px; font-weight: bold; line-height: 1; }
  .eq  { color: #999966; font-size: 24px; line-height: 1; }
  .num { font-size: 13px; font-weight: bold; color: #333; margin-left: auto; }
  #hint { font-size: 12px; color: #888; margin: 5px 0; line-height: 1.5; text-align: center; background: #f9f9f9; padding: 6px; border-radius: 4px; }
  #note { font-size: 12px; color: #444; margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; line-height: 1.6; }
  .surplus-txt { color: #cc0000; font-weight: bold; }
  .shortage-txt { color: #cc8800; font-weight: bold; }
</style>
</head>
<body>

<canvas id="c" width="590" height="510"></canvas>

<div id="panel">
  <h3>Změna od rovnováhy</h3>
  <div id="hint">Klikni nebo táhni myší v grafu</div>
  <div id="rows"></div>
  <div id="note"></div>
</div>

<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 590, H = 510;
const ML = 55, MR = 25, MT = 25, MB = 55;
const PW = W - ML - MR;
const PH = H - MT - MB;
const QMAX = 50, CMAX = 60;

// Ekonomický model (Poptávka a Nabídka)
const p_d = Q => 60 * Math.exp(-0.0277 * Q);
const p_s = Q => 10 + 0.032 * Q * Q;

const q_d = P => P <= 0 ? QMAX : Math.min(QMAX, -Math.log(P / 60) / 0.0277);
const q_s = P => P <= 10 ? 0 : Math.min(QMAX, Math.sqrt((P - 10) / 0.032));

const QE = 25, PE = 30; // Bod rovnováhy E

// Převody souřadnic
const tx = Q => ML + Q / QMAX * PW;
const ty = C => MT + PH - C / CMAX * PH;
const cFromY = y => CMAX - (y - MT) / PH * CMAX;

let selP = null; // Zvolená cena uživatelem
let isDragging = false;

function ln(x1, y1, x2, y2) { cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke(); }

function drawBackgroundZones() {
  // 1. Zóna přebytku (horní část nad PE)
  cx.fillStyle = 'rgba(255, 235, 235, 0.6)';
  cx.fillRect(ML, ty(CMAX), PW, ty(PE) - ty(CMAX));
  cx.fillStyle = 'rgba(180, 50, 50, 0.4)';
  cx.font = 'italic 12px Arial';
  cx.fillText('přebytek (surplus)', ML + PW - 110, ty(CMAX) + 20);

  // 2. Zóna nedostatku (dolní část pod PE k P=10)
  cx.fillStyle = 'rgba(255, 250, 220, 0.6)';
  cx.fillRect(ML, ty(PE), PW, ty(10) - ty(PE));
  cx.fillStyle = 'rgba(160, 110, 20, 0.5)';
  cx.fillText('nedostatek (shortage)', ML + PW - 125, ty(PE) + 20);

  // 3. Oblast pod nabídkou (P < 10)
  cx.fillStyle = '#f5f5f5';
  cx.fillRect(ML, ty(10), PW, ty(0) - ty(10));
}

function drawGrid() {
  cx.strokeStyle = '#e8e8e8'; cx.lineWidth = 1;
  for (let q = 5; q < QMAX; q += 5) ln(tx(q), MT, tx(q), MT + PH);
  for (let c = 5; c < CMAX; c += 5) ln(ML, ty(c), ML + PW, ty(c));
}

function drawAxes() {
  cx.strokeStyle = '#333'; cx.lineWidth = 2;
  ln(ML, MT + PH, ML + PW + 10, MT + PH); // Osa Q
  ln(ML, MT + PH, ML, MT - 10);          // Osa P
  
  cx.fillStyle = '#111'; cx.font = 'bold 14px Arial';
  cx.fillText('Q', ML + PW + 12, MT + PH + 5);
  cx.fillText('P, C', ML - 35, MT - 12);

  cx.font = '11px Arial'; cx.fillStyle = '#555';
  for (let q = 10; q <= QMAX; q += 10) {
    ln(tx(q), MT + PH, tx(q), MT + PH + 5);
    cx.fillText(q, tx(q) - 6, MT + PH + 18);
  }
  for (let c = 10; c <= CMAX; c += 10) {
    ln(ML - 5, ty(c), ML, ty(c));
    cx.fillText(c, ML - 25, ty(c) + 4);
  }
}

function drawCurve(fn, color, label, lblQ) {
  cx.beginPath(); cx.strokeStyle = color; cx.lineWidth = 3;
  let first = true;
  for (let q = 0; q <= QMAX; q += 0.5) {
    const y = ty(fn(q));
    if (y >= MT && y <= MT + PH) {
      if (first) { cx.moveTo(tx(q), y); first = false; }
      else cx.lineTo(tx(q), y);
    }
  }
  cx.stroke();
  cx.fillStyle = color; cx.font = 'bold 14px Arial';
  cx.fillText(label, tx(lblQ), ty(fn(lblQ)) - 8);
}

function drawInteractiveZone() {
  if (selP === null) return;
  const p = selP;
  const qd = q_d(p);
  const qs = q_s(p);
  const xQD = tx(qd);
  const xQS = tx(qs);
  const yP = ty(p);
  const y0 = ty(0);

  cx.save();
  // Vykreslení velkého transparentního obdélníku (ZÓNY) dolů k ose Q jako u grafu 1
  if (p > PE) { // Přebytek
    cx.fillStyle = 'rgba(215, 50, 50, 0.25)';
    cx.strokeStyle = 'rgba(180, 30, 30, 0.6)';
    cx.fillRect(xQD, yP, xQS - xQD, y0 - yP);
    cx.lineWidth = 1.5;
    cx.strokeRect(xQD, yP, xQS - xQD, y0 - yP);

    // Text přímo uvnitř zóny v grafu
    cx.fillStyle = '#cc0000'; cx.font = 'bold 14px Arial'; cx.textAlign = 'center';
    cx.fillText(`Přebytek: ${(qs - qd).toFixed(1)}`, xQD + (xQS - xQD)/2, yP + (y0 - yP)/2);
  } else if (p < PE && p >= 10) { // Nedostatek
    cx.fillStyle = 'rgba(235, 175, 0, 0.25)';
    cx.strokeStyle = 'rgba(200, 140, 30, 0.6)';
    cx.fillRect(xQS, yP, xQD - xQS, y0 - yP);
    cx.lineWidth = 1.5;
    cx.strokeRect(xQS, yP, xQD - xQS, y0 - yP);

    // Text přímo uvnitř zóny v grafu
    cx.fillStyle = '#c68400'; cx.font = 'bold 14px Arial'; cx.textAlign = 'center';
    cx.fillText(`Nedostatek: ${(qd - qs).toFixed(1)}`, xQS + (xQD - xQS)/2, yP + (y0 - yP)/2);
  }

  // Svislé a vodorovné čárkované vodící čáry (podle tvého obrázku 4)
  cx.setLineDash([5, 4]); cx.strokeStyle = '#444'; cx.lineWidth = 1.2;
  
  // Čára od osy P ke křivkám
  ln(ML, yP, Math.max(xQD, xQS), yP);
  
  // Svislé čáry dolů k ose Q pro Qd a Qs
  if (p >= 10) {
    ln(xQD, yP, xQD, y0);
    ln(xQS, yP, xQS, y0);
    
    // Popisky na ose Q
    cx.setLineDash([]); cx.fillStyle = '#1e88e5'; cx.font = 'bold 11px Arial'; cx.textAlign = 'center';
    cx.fillText(`Qd`, xQD, y0 + 14);
    cx.fillStyle = '#e53935';
    cx.fillText(`Qs`, xQS, y0 + 14);
  }
  cx.restore();
}

function drawEquilibrium() {
  cx.save(); cx.setLineDash([3, 3]); cx.strokeStyle = '#777'; cx.lineWidth = 1;
  ln(tx(QE), ty(PE), tx(QE), ty(0));
  ln(tx(QE), ty(PE), ML, ty(PE));
  cx.restore();

  cx.beginPath(); cx.arc(tx(QE), ty(PE), 6, 0, Math.PI * 2);
  cx.fillStyle = '#fff'; cx.fill();
  cx.strokeStyle = '#222'; cx.lineWidth = 2; cx.stroke();
  
  cx.fillStyle = '#222'; cx.font = 'bold 12px Arial';
  cx.fillText('E', tx(QE) + 10, ty(PE) - 8);
}

function draw() {
  cx.clearRect(0, 0, W, H);
  drawBackgroundZones();
  drawGrid();
  drawInteractiveZone(); // Vykreslení barevných obdélníků (přebytek/nedostatek)
  drawCurve(p_d, '#1e88e5', 'D', 42); // Modrá Poptávka
  drawCurve(p_s, '#e53935', 'S', 40); // Červená Nabídka
  drawEquilibrium();
  drawAxes();
}

// Aktualizace bočního informačního panelu
function arrowFor(val, ref) {
  if (val - ref > 0.1) return { a: '↑', cls: 'up' };
  if (ref - val > 0.1) return { a: '↓', cls: 'dn' };
  return { a: '≈', cls: 'eq' };
}
function indRow(label, val, ref) {
  const { a, cls } = arrowFor(val, ref);
  return `<div class="row"><span class="lbl">${label}</span><span class="${cls}">${a}</span><span class="num">${val.toFixed(1)}</span></div>`;
}

function updatePanel() {
  const rowsDiv = document.getElementById('rows');
  const noteDiv = document.getElementById('note');
  
  if (selP === null) {
    rowsDiv.innerHTML = '';
    noteDiv.innerHTML = `<b>Tržní rovnováha (Bod E):</b><br>Rovnovážná cena <b>Pe = ${PE}</b><br>Rovnovážné množství <b>Qe = ${QE}</b>`;
    return;
  }

  const p = selP; const qd = q_d(p); const qs = q_s(p); const diff = qs - qd;
  rowsDiv.innerHTML = indRow('Cena (P)', p, PE) + indRow('Poptávka (Qd)', qd, QE) + indRow('Nabídka (Qs)', qs, QE);

  let statusText = '';
  let finalCalculations = '';

  if (p > PE) {
    statusText = '<span class="surplus-txt">🟢 P > Pe → Tržní přebytek (Surplus)</span><br>Výrobci chtějí prodávat více než spotřebitelé koupit. Cena bude tlačená dolů.';
    finalCalculations = `<br><br><span class="surplus-txt">Celkový přebytek zboží: ${diff.toFixed(1)}</span>`;
  } else if (p < PE && p >= 10) {
    statusText = '<span class="shortage-txt">🟡 P < Pe → Tržní nedostatek (Shortage)</span><br>Spotřebitelé chtějí koupit více než výrobci nabízí. Cena bude tlačená vzhůru.';
    finalCalculations = `<br><br><span class="shortage-txt">Celkový nedostatek zboží: ${Math.abs(diff).toFixed(1)}</span>`;
  } else {
    statusText = '<span class="surplus-txt">🔴 P < 10 → Kriticky nízká cena</span><br>Při této ceně nikdo nic nevyrobí (Nabídka Qs = 0).';
  }

  noteDiv.innerHTML = `<b>Zvolená tržní cena P = ${p.toFixed(1)}</b><br><br>${statusText}${finalCalculations}`;
}

// Event Listenery pro plynulé klikání a tažení
function handleEvent(e) {
  const rect = cv.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  if (x >= ML && x <= ML + PW && y >= MT && y <= MT + PH) {
    selP = Math.max(0, Math.min(CMAX, cFromY(y)));
    draw();
    updatePanel();
  }
}

cv.addEventListener('mousedown', e => { isDragging = true; handleEvent(e); });
window.addEventListener('mousemove', e => { if (isDragging) handleEvent(e); });
window.addEventListener('mouseup', () => { isDragging = false; });
cv.addEventListener('click', handleEvent);

// Inicializace
updatePanel();
draw();
</script>
</body>
</html>
