<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Poptávka a nabídka</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    display: flex; 
    gap: 20px; 
    background: #f4f4f4; 
    padding: 20px; 
    margin: 0;
  }
  .container { 
    background: white; 
    border: 1px solid #ccc; 
    display: flex; 
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  canvas { 
    cursor: crosshair; 
    display: block;
  }
  .panel { 
    padding: 20px; 
    border-left: 1px solid #ccc; 
    min-width: 250px; 
    background: #fafafa; 
  }
  h3 { margin-top: 0; margin-bottom: 5px; font-size: 16px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
  .hint { font-size: 12px; color: gray; margin-bottom: 15px; }
  .row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; font-weight: bold; font-size: 14px;}
  .up { color: #d32f2f; font-size: 18px; }
  .down { color: #388e3c; font-size: 18px; }
  .eq { color: gray; font-size: 18px; }
  .surplus { color: #d32f2f; font-weight: bold; }
  .shortage { color: #f57c00; font-weight: bold; }
  #status-box { margin-top: 20px; font-size: 13px; line-height: 1.5; }
</style>
</head>
<body>

<div class="container">
  <canvas id="graphCanvas" width="550" height="450"></canvas>
  <div class="panel">
    <h3>Změna od rovnováhy</h3>
    <div class="hint">Klikni nebo táhni myší v grafu</div>
    <div id="data-rows"></div>
    <div id="status-box"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

const W = 550, H = 450;
const pad = { top: 30, right: 30, bottom: 40, left: 40 };
const innerW = W - pad.left - pad.right;
const innerH = H - pad.top - pad.bottom;

const QMAX = 50;
const PMAX = 60;

// Rovnice
const p_d = Q => 60 * Math.exp(-0.0277 * Q);
const q_d = P => {
  if (P >= 60) return 0;
  if (P <= 0.1) return QMAX;
  return Math.max(0, -Math.log(P / 60) / 0.0277);
};

const p_s = Q => 10 + 0.032 * Q * Q;
const q_s = P => {
  if (P <= 10) return 0;
  return Math.max(0, Math.sqrt((P - 10) / 0.032));
};

const Pe = 30; // Rovnovážná cena
const Qe = 25; // Rovnovážné množství

// Přepočet na pixely
const sx = Q => pad.left + (Q / QMAX) * innerW;
const sy = P => pad.top + innerH - (P / PMAX) * innerH;
const pFromY = y => PMAX - ((y - pad.top) / innerH) * PMAX;

let currentP = 50; // Výchozí cena
let isDragging = false;

function draw() {
  ctx.clearRect(0, 0, W, H);
  
  // Mřížka
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for(let i=10; i<=QMAX; i+=10) { ctx.moveTo(sx(i), pad.top); ctx.lineTo(sx(i), pad.top + innerH); }
  for(let i=10; i<=PMAX; i+=10) { ctx.moveTo(pad.left, sy(i)); ctx.lineTo(pad.left + innerW, sy(i)); }
  ctx.stroke();

  // Osy
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + innerH);
  ctx.moveTo(pad.left, pad.top + innerH); ctx.lineTo(pad.left + innerW, pad.top + innerH);
  ctx.stroke();
  
  ctx.fillStyle = '#000';
  ctx.font = 'bold 12px Arial';
  ctx.fillText('P', pad.left - 20, pad.top - 10);
  ctx.fillText('Q', pad.left + innerW + 10, pad.top + innerH + 5);
  
  ctx.font = '11px Arial';
  ctx.fillStyle = '#666';
  for(let i=10; i<=QMAX; i+=10) ctx.fillText(i, sx(i) - 6, pad.top + innerH + 15);
  for(let i=10; i<=PMAX; i+=10) ctx.fillText(i, pad.left - 22, sy(i) + 4);

  // Křivka poptávky (Modrá)
  ctx.strokeStyle = '#2196F3';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for(let q=0; q<=QMAX; q+=0.5) {
    let p = p_d(q);
    if(p <= PMAX) {
      if(q===0) ctx.moveTo(sx(q), sy(p));
      else ctx.lineTo(sx(q), sy(p));
    }
  }
  ctx.stroke();
  ctx.fillStyle = '#2196F3';
  ctx.fillText('D (Poptávka)', sx(33), sy(p_d(33)) - 10);

  // Křivka nabídky (Červená)
  ctx.strokeStyle = '#F44336';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for(let q=0; q<=QMAX; q+=0.5) {
    let p = p_s(q);
    if(p <= PMAX) {
      if(q===0) ctx.moveTo(sx(q), sy(p));
      else ctx.lineTo(sx(q), sy(p));
    }
  }
  ctx.stroke();

  // Rovnováha E
  ctx.setLineDash([3, 3]);
  ctx.strokeStyle = '#999';
  ctx.beginPath();
  ctx.moveTo(sx(Qe), sy(Pe)); ctx.lineTo(sx(Qe), pad.top + innerH);
  ctx.moveTo(sx(Qe), sy(Pe)); ctx.lineTo(pad.left, sy(Pe));
  ctx.stroke();
  ctx.setLineDash([]);
  
  ctx.beginPath();
  ctx.arc(sx(Qe), sy(Pe), 4, 0, Math.PI*2);
  ctx.fillStyle = 'white'; ctx.fill();
  ctx.strokeStyle = '#333'; ctx.stroke();
  ctx.fillStyle = '#333';
  ctx.fillText('E (Rovnováha)', sx(Qe) - 25, sy(Pe) - 10);
  ctx.fillStyle = '#888';
  ctx.fillText(`(Qe=${Qe}, Pe=${Pe})`, sx(Qe) - 25, sy(Pe) + 15);

  // Zvýraznění přebytku/nedostatku
  let Qd = q_d(currentP);
  let Qs = q_s(currentP);
  
  // Linka aktuální ceny
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(pad.left, sy(currentP));
  ctx.lineTo(pad.left + innerW, sy(currentP));
  ctx.stroke();
  ctx.setLineDash([]);

  if (currentP > Pe + 0.1) {
    // HORIZONTÁLNÍ PRUH PRO PŘEBYTEK
    let y = sy(currentP);
    let x1 = sx(Qd);
    let x2 = sx(Qs);
    
    ctx.fillStyle = 'rgba(244, 67, 54, 0.4)';
    ctx.strokeStyle = '#d32f2f';
    ctx.lineWidth = 1;
    ctx.fillRect(x1, y - 3, x2 - x1, 6);
    ctx.strokeRect(x1, y - 3, x2 - x1, 6);
    
    ctx.fillStyle = '#d32f2f';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`Přebytek: ${(Qs - Qd).toFixed(1)}`, (x1 + x2)/2, y - 10);
    ctx.textAlign = 'left';

  } else if (currentP < Pe - 0.1 && currentP >= 10) {
    // HORIZONTÁLNÍ PRUH PRO NEDOSTATEK
    let y = sy(currentP);
    let x1 = sx(Qs);
    let x2 = sx(Qd);
    
    ctx.fillStyle = 'rgba(255, 152, 0, 0.4)';
    ctx.strokeStyle = '#f57c00';
    ctx.lineWidth = 1;
    ctx.fillRect(x1, y - 3, x2 - x1, 6);
    ctx.strokeRect(x1, y - 3, x2 - x1, 6);
    
    ctx.fillStyle = '#f57c00';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`Nedostatek: ${(Qd - Qs).toFixed(1)}`, (x1 + x2)/2, y + 18);
    ctx.textAlign = 'left';
  }
}

function updatePanel() {
  let Qd = q_d(currentP);
  let Qs = q_s(currentP);
  
  const rows = document.getElementById('data-rows');
  const status = document.getElementById('status-box');
  
  const getArrow = (val, eq) => val > eq + 0.1 ? '<span class="up">↑</span>' : (val < eq - 0.1 ? '<span class="down">↓</span>' : '<span class="eq">=</span>');
  
  rows.innerHTML = `
    <div class="row"><span>P</span> <span>${getArrow(currentP, Pe)} &nbsp; ${currentP.toFixed(1)}</span></div>
    <div class="row"><span>Qd</span> <span>${getArrow(Qd, Qe)} &nbsp; ${Qd.toFixed(1)}</span></div>
    <div class="row"><span>Qs</span> <span>${getArrow(Qs, Qe)} &nbsp; ${Qs.toFixed(1)}</span></div>
  `;
  
  if (currentP > Pe + 0.1) {
    status.innerHTML = `<span style="color: #388e3c; font-weight: bold;">🟢 P > Pe → Tržní přebytek</span><br><br>
    Cena je moc vysoká. Výrobci nabízí víc, než lidé chtějí koupit. Vzniká tlak na snížení ceny.<br><br>
    <span class="surplus">Celkový přebytek: ${(Qs - Qd).toFixed(1)}</span>`;
  } else if (currentP < Pe - 0.1 && currentP >= 10) {
    status.innerHTML = `<span style="color: #f57c00; font-weight: bold;">🟡 P < Pe → Tržní nedostatek</span><br><br>
    Nízká cena láká kupující, ale firmám se nechce vyrábět. Zboží je nedostatek, cena poletí vzhůru.<br><br>
    <span class="shortage">Celkový nedostatek: ${(Qd - Qs).toFixed(1)}</span>`;
  } else if (currentP < 10) {
    status.innerHTML = `<span style="color: #d32f2f; font-weight: bold;">🔴 Cena je příliš nízká</span><br>Nikdo nevyrábí.`;
  } else {
    status.innerHTML = `<span style="color: #388e3c; font-weight: bold;">🟢 Tržní rovnováha</span><br>Poptávka = Nabídka`;
  }
}

function handleMouse(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleY = canvas.height / rect.height;
  const y = (e.clientY - rect.top) * scaleY;
  
  let p = pFromY(y);
  if (p < 0) p = 0;
  if (p > PMAX) p = PMAX;
  currentP = p;
  
  draw();
  updatePanel();
}

canvas.addEventListener('mousedown', e => { isDragging = true; handleMouse(e); });
window.addEventListener('mousemove', e => { if(isDragging) handleMouse(e); });
window.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('click', handleMouse);

draw();
updatePanel();
</script>
</body>
</html>
