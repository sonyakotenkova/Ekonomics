<script>
// OCHRANA: Pokud prohlížeč narazí na chybu, vypíše ji přímo do plátna
window.onerror = function(msg, url, line) {
  const c = document.getElementById('c');
  if (c) {
    const ctx = c.getContext('2d');
    ctx.fillStyle = 'red'; ctx.font = 'bold 16px Arial';

  return false;

const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 590, H = 510;
const ML = 55, MR = 20, MT = 22, MB = 52;
const PW = W - ML - MR;
const PH = H - MT - MB;
const QMAX = 50, CMAX = 60;

const p_d = Q => 60 * Math.exp(-0.0277 * Q);
const p_s = Q => 10 + 0.032 * Q * Q;
const q_d = P => {
  if (P >= 60) return 0;
  if (P <= 0.1) return QMAX;
  return Math.max(0, Math.min(QMAX, -Math.log(P / 60) / 0.0277));
};
const q_s = P => {
  if (P <= 10) return 0;
  return Math.max(0, Math.min(QMAX, Math.sqrt((P - 10) / 0.032)));
};

const QE = 25, PE = 30;
const tx    = Q => ML + Q / QMAX * PW;
const ty    = C => MT + PH - C / CMAX * PH;
const cFrom = y => CMAX - (y - MT) / PH * CMAX;

let selP = 40;

function ln(x1, y1, x2, y2) { cx.beginPath(); cx.moveTo(x1, y1); cx.lineTo(x2, y2); cx.stroke(); }

function drawGrid() {
  cx.strokeStyle = '#f0f0f0'; cx.lineWidth = 1;
  for (let q = 5; q <= QMAX; q += 5) ln(tx(q), MT, tx(q), MT + PH);
  for (let c = 5; c <= CMAX; c += 5) ln(ML, ty(c), ML + PW, ty(c));
}

function drawAxes() {
  cx.strokeStyle = '#444'; cx.lineWidth = 1.5;
  ln(ML, MT + PH, ML + PW + 10, MT + PH);
  ln(ML, MT + PH, ML, MT - 10);
  cx.fillStyle = '#333'; cx.font = '13px Arial';
  cx.fillText('Q', ML + PW + 14, MT + PH + 5);
  cx.fillText('P', ML - 24, MT - 14);
  cx.font = '10px Arial'; cx.fillStyle = '#666';
  for (let q = 10; q <= QMAX; q += 10) {
    cx.strokeStyle = '#999'; cx.lineWidth = 1;
    ln(tx(q), MT + PH, tx(q), MT + PH + 5);
    cx.fillText(q, tx(q) - 6, MT + PH + 17);
  }
  for (let c = 10; c <= CMAX; c += 10) {
    cx.strokeStyle = '#999'; cx.lineWidth = 1;
    ln(ML - 5, ty(c), ML, ty(c));
    cx.fillText(c, ML - 25, ty(c) + 4);
  }
}

function drawInteractiveZone() {
  if (selP === null) return;
  const p = selP;
  const qd = q_d(p);
  const qs = q_s(p);
  const yP = ty(p);

  cx.save();
  cx.setLineDash([4, 4]); cx.strokeStyle = '#666'; cx.lineWidth = 1;
  ln(ML, yP, ML + PW, yP);
  cx.setLineDash([]);
  cx.fillStyle = '#333'; cx.font = 'bold 11px Arial';
  cx.fillText('P=' + p.toFixed(1), 5, yP + 4);

  if (p > PE + 0.1) {
    const x1 = tx(qd), x2 = tx(qs);
    cx.fillStyle = 'rgba(215, 50, 50, 0.2)';
    cx.strokeStyle = '#cc0000'; cx.lineWidth = 1.5;
    cx.fillRect(x1, yP - 4, x2 - x1, 8);
    cx.strokeRect(x1, yP - 4, x2 - x1, 8);
    cx.fillStyle = '#cc0000'; cx.font = 'bold 11px Arial'; cx.textAlign = 'center';
    cx.fillText('Přebytek: ' + (qs - qd).toFixed(1), (x1 + x2)/2, yP - 10);
  } else if (p < PE - 0.1 && p >= 10) {
    const x1 = tx(qs), x2 = tx(qd);
    cx.fillStyle = 'rgba(235, 175, 0, 0.2)';
    cx.strokeStyle = '#cc8800'; cx.lineWidth = 1.5;
    cx.fillRect(x1, yP - 4, x2 - x1, 8);
    cx.strokeRect(x1, yP - 4, x2 - x1, 8);
    cx.fillStyle = '#cc8800'; cx.font = 'bold 11px Arial'; cx.textAlign = 'center';
    cx.fillText('Nedostatek: ' + (qd - qs).toFixed(1), (x1 + x2)/2, yP + 18);
  }
  cx.restore();
}

function drawCurve(fn, color, label, lblQ) {
  cx.save();
  cx.beginPath(); cx.rect(ML, MT, PW, PH); cx.clip();
  cx.beginPath(); cx.strokeStyle = color; cx.lineWidth = 2.5;
  let first = true;
  for (let q = 0; q <= QMAX; q += 0.5) {
    const y = ty(fn(q));
    if (first) { cx.moveTo(tx(q), y); first = false; }
    else cx.lineTo(tx(q), y);
  }
  cx.stroke(); cx.restore();
  cx.fillStyle = color; cx.font = 'bold 13px Arial';
  cx.fillText(label, tx(lblQ) + 4, ty(fn(lblQ)) - 4);
}

function drawEquilibrium() {
  cx.save(); cx.setLineDash([4, 4]); cx.strokeStyle = '#bbb'; cx.lineWidth = 1;
  ln(tx(QE), ty(PE), tx(QE), ty(0));
  ln(tx(QE), ty(PE), ML, ty(PE));
  cx.restore();
  cx.beginPath(); cx.arc(tx(QE), ty(PE), 5.5, 0, Math.PI * 2);
  cx.fillStyle = '#fff'; cx.fill();
  cx.strokeStyle = '#333'; cx.lineWidth = 2; cx.stroke();
  cx.fillStyle = '#333'; cx.font = 'bold 11px Arial'; cx.textAlign = 'center';
  cx.fillText('E (Q=25, P=30)', tx(QE), ty(PE) - 12);
}

function draw() {
  cx.clearRect(0, 0, W, H);
  cx.fillStyle = '#fff'; cx.fillRect(0, 0, W, H);
  drawGrid();
  drawInteractiveZone();
  drawAxes();
  drawCurve(p_d, '#1e88e5', 'D', 42); 
  drawCurve(p_s, '#e53935', 'S', 40); 
  drawEquilibrium();
}

function arrowFor(val, ref) {
  const d = val - ref;
  if (d >  0.1) return { a: '↑', cls: 'up' };
  if (d < -0.1) return { a: '↓', cls: 'dn' };
  return { a: '≈', cls: 'eq' };
}

function indRow(label, val, ref) {
  const { a, cls } = arrowFor(val, ref);
  return `<div class="row"><span class="lbl">${label}</span><span class="${cls}">${a}</span><span class="num">${val.toFixed(1)}</span></div>`;
}

function updatePanel() {

  } else if (p < PE - 0.1 && p >= 10) {

  } else {
    statusText = `<b>🟢 Tržní rovnováha</b><br>Trh je vyčištěn (Qd = Qs).`;
  }
  noteDiv.innerHTML = `<b>Při ceně P = ${p.toFixed(1)}</b><br><br>${statusText}`;
}
